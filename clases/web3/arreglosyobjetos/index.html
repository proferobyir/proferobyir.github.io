<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de uso de arreglos y objetos en JavaScript</title>
    <style>
        #visor-de-pokemones {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .estiloTarjeta {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            text-align: center;
            font-family: Arial, sans-serif;
        }
    </style>

</head>

<body>
    <h1>Mostrando los pokemones en el body usando el ciclo forEach:</h1>
    <div id="visor-de-pokemones"></div>

    <script>
        // Creamos un arreglo de objetos donde cada objeto representa un Pokemon
        const pokemones = [
            { nombre: "Pikachu", tipo: "Eléctrico", nivel: 25, imagen: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" },
            { nombre: "Charmander", tipo: "Fuego", nivel: 15, imagen: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" },
            { nombre: "Squirtle", tipo: "Agua", nivel: 20, imagen: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" }];

        //Función flecha para crear una tarjeta de Pokémon con estilo y contenido dinámico
        const crearTarjetaPokemon = (titulo, tipo, nivel, imagen) => {
            return `<div class="estiloTarjeta">
                        <img src="${imagen}" alt="${titulo}" style="width: 100px;">
                        <h3>${titulo}</h3>
                        <p>Tipo: ${tipo}</p>
                        <p>Nivel: ${nivel}</p>
                    </div>`;
        }

        function mostrarPokemones() {
            const visor = document.getElementById("visor-de-pokemones");//que lo definimos en el body, para que se muestre en el visor de pokemones
            visor.innerHTML = ""; // Limpiamos el contenido previo del visor

            pokemones.forEach(pokemon => {
                visor.innerHTML += crearTarjetaPokemon(pokemon.nombre, pokemon.tipo, pokemon.nivel, pokemon.imagen);
            });
        }

        // Llamamos a la función para mostrar los pokemones al cargar la página
        document.addEventListener("DOMContentLoaded", mostrarPokemones);
    </script>
</body>

</html>
