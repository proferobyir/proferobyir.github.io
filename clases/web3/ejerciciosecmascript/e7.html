<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #1a0a00;
            color: #ffd700;
        }

        #forja {
            background: #2d1810;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            border: 3px solid #b8860b;
        }

        #armaResultado {
            font-size: 100px;
            padding: 20px;
            background: #1a0a00;
            border-radius: 15px;
            margin: 15px 0;
        }

        select,
        button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #b8860b;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #d4a017;
        }

        #logForja {
            background: #1a0a00;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
    </style>
</head>

<body>
    <div id="forja">
        <h2>⚒️ FORJA DE ARMAS ⚒️</h2>

        <div id="armaResultado">⚔️</div>
        <div id="logForja">🔥 Elige materiales para forjar</div>

        <form id="formArma">
            <select id="material1">
                <option value="🪨">🪨 Piedra</option>
                <option value="🪵">🪵 Madera</option>
                <option value="🪙">🪙 Metal</option>
            </select>

            <select id="material2">
                <option value="🪨">🪨 Piedra</option>
                <option value="🪵">🪵 Madera</option>
                <option value="🪙">🪙 Metal</option>
            </select>

            <select id="encantamiento">
                <option value="🔥">🔥 Fuego</option>
                <option value="❄️">❄️ Hielo</option>
                <option value="⚡">⚡ Rayo</option>
                <option value="💚">💚 Naturaleza</option>
            </select>

            <button type="submit">🔨 Forjar Arma</button>
        </form>
    </div>

    <script>
        const recetas = {
            '🪨🪨': { arma: '🪓', nombre: 'Hacha de Piedra' },
            '🪵🪵': { arma: '🏹', nombre: 'Arco de Madera' },
            '🪙🪙': { arma: '⚔️', nombre: 'Espada de Metal' },
            '🪨🪵': { arma: '🛡️', nombre: 'Escudo de Madera y Piedra' },
            '🪵🪙': { arma: '🗡️', nombre: 'Daga de Metal y Madera' },
            '🪙🪨': { arma: '🔨', nombre: 'Martillo de Piedra y Metal' }
        };

        document.getElementById('formArma').addEventListener('submit', (e) => {
            e.preventDefault();
            const m1 = document.getElementById('material1').value;
            const m2 = document.getElementById('material2').value;
            const encanto = document.getElementById('encantamiento').value;

            const clave = m1 + m2;
            const receta = recetas[clave] || { arma: '🔧', nombre: 'Arma Genérica' };

            const armaFinal = receta.arma + encanto;
            document.getElementById('armaResultado').textContent = armaFinal;

            console.log('⚒️ ARMA FORJADA:');
            console.log(`Nombre: ${receta.nombre}`);
            console.log(`Materiales: ${m1} + ${m2}`);
            console.log(`Encantamiento: ${encanto}`);
            console.log(`Arma final: ${armaFinal}`);
            console.log('✅ ¡Arma creada con éxito!');

            document.getElementById('logForja').innerHTML = `🔨 ¡Has creado ${receta.nombre}! ${armaFinal}`;
        });
    </script>
</body>

</html>
