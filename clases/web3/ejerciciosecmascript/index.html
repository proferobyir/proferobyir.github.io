<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECMAScript - 10 Ejercicios Resueltos</title>
    <style>
        /* --- Reset y Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #dbeafe;
            --success: #22c55e;
            --success-dark: #16a34a;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
        }

        /* --- Layout --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- Header --- */
        .header {
            background: linear-gradient(135deg, var(--gray-900), var(--gray-800));
            color: white;
            padding: 40px 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: 'JS';
            position: absolute;
            right: -20px;
            bottom: -40px;
            font-size: 12rem;
            font-weight: 900;
            color: rgba(247, 223, 30, 0.05);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header h1 .badge {
            background: #f7df1e;
            color: #000;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .header p {
            color: var(--gray-300);
            font-size: 1.1rem;
            max-width: 600px;
        }

        .header .meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .header .meta span {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--gray-300);
        }

        /* --- Navegación --- */
        .nav-exercises {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 15px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .nav-exercises .nav-btn {
            padding: 8px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            background: white;
            color: var(--gray-600);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .nav-exercises .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .nav-exercises .nav-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .nav-exercises .nav-btn.completed {
            border-color: var(--success);
            background: #f0fdf4;
            color: var(--success-dark);
        }

        .nav-exercises .nav-btn.completed::after {
            content: ' ✓';
            color: var(--success);
        }

        /* --- Grid Principal --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* --- Panel de Ejercicios --- */
        .exercise-panel {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .exercise-panel .panel-header {
            background: var(--gray-800);
            color: white;
            padding: 20px 25px;
        }

        .exercise-panel .panel-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exercise-panel .panel-header .exercise-number {
            background: var(--primary);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .exercise-panel .panel-body {
            padding: 25px;
        }

        .exercise-panel .panel-body .description {
            background: var(--gray-50);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }

        .exercise-panel .panel-body .description strong {
            color: var(--primary-dark);
        }

        /* --- Bloques de Código --- */
        .code-block {
            background: var(--gray-900);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 15px 0;
            position: relative;
        }

        .code-block pre {
            color: #e2e8f0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .code-block .comment {
            color: #64748b;
        }

        .code-block .keyword {
            color: #c084fc;
        }

        .code-block .string {
            color: #fcd34d;
        }

        .code-block .function {
            color: #60a5fa;
        }

        .code-block .variable {
            color: #34d399;
        }

        .code-block .number {
            color: #f472b6;
        }

        .code-block .operator {
            color: #fbbf24;
        }

        .code-block .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gray-700);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: var(--transition);
        }

        .code-block .copy-btn:hover {
            background: var(--gray-600);
        }

        /* --- Explicación --- */
        .explanation {
            background: var(--primary-light);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--primary);
        }

        .explanation strong {
            color: var(--primary-dark);
        }

        .explanation .icon {
            font-size: 1.2rem;
        }

        /* --- Panel de Conceptos --- */
        .concepts-panel {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            position: sticky;
            top: 80px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .concepts-panel h3 {
            color: var(--gray-800);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--gray-200);
        }

        .concepts-panel .concept-item {
            padding: 12px;
            margin-bottom: 10px;
            background: var(--gray-50);
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            transition: var(--transition);
            cursor: pointer;
        }

        .concepts-panel .concept-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .concepts-panel .concept-item .concept-title {
            font-weight: 600;
            color: var(--gray-800);
        }

        .concepts-panel .concept-item .concept-desc {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 4px;
        }

        .concepts-panel .concept-item .concept-syntax {
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }

        /* --- Progreso --- */
        .progress-container {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .progress-container .progress-bar {
            height: 10px;
            background: var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-container .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-container .progress-text {
            display: flex;
            justify-content: space-between;
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        /* --- Botones --- */
        .btn {
            display: inline-block;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gray-300);
            color: var(--gray-600);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header::after {
                font-size: 6rem;
                right: -10px;
                bottom: -20px;
            }

            .nav-exercises {
                padding: 10px;
                gap: 6px;
            }

            .nav-exercises .nav-btn {
                font-size: 0.8rem;
                padding: 6px 12px;
            }

            .exercise-panel .panel-body {
                padding: 15px;
            }

            .concepts-panel {
                position: static;
                max-height: none;
            }

            .code-block {
                padding: 15px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .header .meta span {
                font-size: 0.75rem;
                padding: 4px 10px;
            }

            .exercise-panel .panel-header h2 {
                font-size: 1.1rem;
            }

            .btn {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
        }

        /* --- Animaciones --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .exercise-panel {
            animation: fadeIn 0.3s ease;
        }

        /* --- Toast Notification --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gray-900);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.info {
            border-left: 4px solid var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>
                ECMAScript 6+
                <span class="badge">ES6+</span>
            </h1>
            <p>10 ejercicios prácticos resueltos con explicaciones detalladas para dominar JavaScript moderno</p>
            <div class="meta">
                <span>📚 10 Ejercicios</span>
                <span>⚡ Conceptos ES6+</span>
                <span> 100% Práctico</span>
            </div>
        </header>

        <!-- Progreso -->
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span><strong>Progreso</strong></span>
                <span id="progressText">0/10 ejercicios completados</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Navegación -->
        <nav class="nav-exercises" id="navExercises">
            <!-- Generado por JavaScript -->
        </nav>

        <!-- Grid Principal -->
        <div class="main-grid">
            <!-- Panel de Ejercicios -->
            <div class="exercise-panel" id="exercisePanel">
                <!-- Generado por JavaScript -->
            </div>

            <!-- Panel de Conceptos -->
            <aside class="concepts-panel">
                <h3>📖 Resumen de Conceptos</h3>
                <div id="conceptsList">
                    <!-- Generado por JavaScript -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // --- DATOS DE LOS EJERCICIOS ---
        const ejercicios = [{
            id: 1,
            titulo: "Variables y Template Literals",
            dificultad: "⭐ Fácil",
            concepto: "const, let, template literals",
            descripcion: "Declarar variables con const y let, y usar template literals para mostrar mensajes.",
            codigo: `//  Solución
        const nombre = "Ana";
        let edad = 22;
        const ciudad = "Madrid";
        
        // Usando template literals (backticks)
        const mensaje = \`Hola, soy \${nombre}, tengo \${edad} años y vivo en \${ciudad}.\`;
        console.log(mensaje);
        
        // También se puede hacer directamente
        console.log(\`Hola, soy \${nombre}, tengo \${edad} años y vivo en \${ciudad}.\`);`,
            explicacion: "💡 const se usa para valores que no cambian (nombre, ciudad). let se usa para valores que pueden cambiar (edad). Los template literals permiten insertar variables con ${}."
        }, {
            id: 2,
            titulo: "Desestructuración de Objetos",
            dificultad: "⭐ Fácil",
            concepto: "Destructuring",
            descripcion: "Extraer propiedades de un objeto usando desestructuración.",
            codigo: `//  Solución
        const producto = {
            nombre: "Laptop",
            precio: 800,
            stock: 15,
            categoria: "Electrónica"
        };
        
        // Desestructuración: extraemos las propiedades que necesitamos
        const { nombre, precio, stock } = producto;
        
        // Mostramos los valores extraídos
        console.log(\`Producto: \${nombre}\`);
        console.log(\`Precio: $\${precio}\`);
        console.log(\`Stock disponible: \${stock} unidades\`);
        
        // También podemos mostrar todo en un solo mensaje
        console.log(\`El producto "\${nombre}" cuesta $\${precio} y hay \${stock} unidades en stock.\`);`,
            explicacion: "💡 La desestructuración usa el mismo nombre de las propiedades del objeto. Es más limpio que usar producto.nombre, producto.precio, etc."
        }, {
            id: 3,
            titulo: "Spread Operator en Arrays",
            dificultad: "⭐ Fácil",
            concepto: "Spread Operator",
            descripcion: "Combinar arrays usando el operador spread (...).",
            codigo: `//  Solución
        const pares = [2, 4, 6, 8];
        const impares = [1, 3, 5, 7];
        
        // Combinamos los arrays usando spread operator
        const numeros = [...pares, ...impares];
        console.log("📋 Array combinado:", numeros);
        // Resultado: [2, 4, 6, 8, 1, 3, 5, 7]
        
        // Si queremos ordenarlos numéricamente
        const numerosOrdenados = [...pares, ...impares].sort((a, b) => a - b);
        console.log("📋 Array combinado y ordenado:", numerosOrdenados);
        // Resultado: [1, 2, 3, 4, 5, 6, 7, 8]
        
        // También podemos combinar en diferente orden
        const numerosAlternativos = [...impares, ...pares];
        console.log("📋 Impares primero:", numerosAlternativos);`,
            explicacion: "💡 Spread (...) 'expande' los elementos del array. Permite combinar arrays de forma inmutable (sin modificar los originales). El orden en que se colocan determina el orden final."
        }, {
            id: 4,
            titulo: "Clonación de Objetos con Spread",
            dificultad: "⭐ Fácil",
            concepto: "Clonación de Objetos",
            descripcion: "Clonar un objeto y modificar la copia sin afectar el original.",
            codigo: `//  Solución
        const configuracion = {
            idioma: "español",
            tema: "oscuro",
            notificaciones: true
        };
        
        // Clonamos el objeto usando spread
        const nuevaConfiguracion = { ...configuracion };
        
        // Modificamos solo la copia
        nuevaConfiguracion.tema = "claro";
        
        // Mostramos ambos objetos para verificar que son diferentes
        console.log("🔹 Objeto ORIGINAL:", configuracion);
        console.log("🔸 Objeto CLONADO:", nuevaConfiguracion);
        
        // Verificamos que son objetos diferentes en memoria
        console.log("¿Son el mismo objeto?", configuracion === nuevaConfiguracion); // false
        
        // También podemos clonar y modificar en un solo paso
        const configRapida = { ...configuracion, tema: "claro", idioma: "inglés" };
        console.log("🔹 Configuración rápida:", configRapida);`,
            explicacion: "💡 Spread crea una copia superficial del objeto. Modificar la copia NO afecta al original. Es una forma segura de trabajar con objetos sin mutarlos."
        }, {
            id: 5,
            titulo: "Promesas Básicas",
            dificultad: "Medio",
            concepto: "Promesas",
            descripcion: "Crear y consumir una promesa simple.",
            codigo: `//  Solución
        function saludoConRetraso() {
            return new Promise((resolve, reject) => {
                // Simulamos una operación asíncrona con setTimeout
                setTimeout(() => {
                    const exito = true; // Cambiar a false para probar el error
                    
                    if (exito) {
                        resolve("¡Hola desde la promesa!");
                    } else {
                        reject(" Error: La promesa falló");
                    }
                }, 2000); // 2 segundos de espera
            });
        }
        
        // Consumimos la promesa
        console.log("Esperando mensaje...");
        
        saludoConRetraso()
            .then(mensaje => {
                console.log("", mensaje);
            })
            .catch(error => {
                console.error("", error);
            })
            .finally(() => {
                console.log(" Promesa finalizada");
            });`,
            explicacion: "💡 new Promise((resolve, reject) => { ... }). resolve() se llama cuando la operación es exitosa. reject() se llama cuando hay un error. .then() maneja el éxito, .catch() maneja el error. .finally() se ejecuta siempre."
        }, {
            id: 6,
            titulo: "Async/Await con Try/Catch",
            dificultad: "Medio",
            concepto: "Async/Await",
            descripcion: "Usar async/await con try/catch para manejar operaciones asíncronas.",
            codigo: `//  Solución
        // Usamos la misma función del ejercicio anterior
        function saludoConRetraso() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const exito = true;
                    if (exito) {
                        resolve("¡Hola desde la promesa!");
                    } else {
                        reject(" Error: La promesa falló");
                    }
                }, 2000);
            });
        }
        
        // Función async que usa await
        async function obtenerSaludo() {
            try {
                console.log("Esperando mensaje...");
                
                // await pausa la ejecución hasta que la promesa se resuelva
                const resultado = await saludoConRetraso();
                
                console.log("", resultado);
                console.log("Proceso completado con éxito");
                
                return resultado; // Esto se convierte en una promesa resuelta
                
            } catch (error) {
                console.error(" Error capturado:", error);
                throw error; // Re-lanzamos el error para manejo externo
            } finally {
                console.log(" Operación finalizada");
            }
        }
        
        // Ejecutamos la función
        obtenerSaludo()
            .then(resultado => {
                console.log("Resultado final:", resultado);
            })
            .catch(error => {
                console.error("Error en el nivel superior:", error);
            });`,
            explicacion: "💡 async convierte la función en una que retorna una promesa. await solo puede usarse dentro de funciones async. try/catch es la forma estándar de manejar errores en async/await."
        }, {
            id: 7,
            titulo: "Métodos de Arrays (filter y map)",
            dificultad: "Medio",
            concepto: "filter, map",
            descripcion: "Filtrar y transformar datos con filter y map.",
            codigo: `//  Solución
        const numeros = [2, 7, 4, 9, 1, 8, 5];
        
        // PASO 1: Filtrar números mayores a 5
        const mayoresQueCinco = numeros.filter(numero => numero > 5);
        console.log("🔍 Números mayores a 5:", mayoresQueCinco);
        // Resultado: [7, 9, 8]
        
        // PASO 2: Duplicar esos números con map
        const duplicados = mayoresQueCinco.map(numero => numero * 2);
        console.log("Números duplicados:", duplicados);
        // Resultado: [14, 18, 16]
        
        // También podemos encadenar los métodos (forma más compacta)
        const resultado = numeros
            .filter(num => num > 5)
            .map(num => num * 2);
        
        console.log("Resultado final (encadenado):", resultado);
        // Resultado: [14, 18, 16]
        
        // Otro ejemplo: Filtrar pares y multiplicarlos por 3
        const paresMultiplicados = numeros
            .filter(num => num % 2 === 0)
            .map(num => num * 3);
        
        console.log("Pares multiplicados por 3:", paresMultiplicados);
        // Resultado: [6, 12, 24]`,
            explicacion: "💡 filter() crea un nuevo array con los elementos que cumplen la condición. map() crea un nuevo array transformando cada elemento. Ambos métodos son INMUTABLES (no modifican el array original). Se pueden encadenar."
        }, {
            id: 8,
            titulo: "reduce() Suma y Promedio",
            dificultad: "Medio",
            concepto: "reduce",
            descripcion: "Calcular suma y promedio con reduce.",
            codigo: `//  Solución
        const ventas = [150, 230, 180, 300, 210];
        
        // PASO 1: Calcular el total usando reduce
        const totalVentas = ventas.reduce((acumulador, venta) => {
            return acumulador + venta;
        }, 0); // El 0 es el valor inicial del acumulador
        
        console.log("Total de ventas:", totalVentas);
        // Resultado: 1070
        
        // PASO 2: Calcular el promedio
        const promedio = totalVentas / ventas.length;
        console.log("Promedio de ventas:", promedio);
        // Resultado: 214
        
        // Versión más compacta de reduce
        const totalCompacto = ventas.reduce((acc, val) => acc + val, 0);
        console.log("Total (compacto):", totalCompacto);
        
        // Ejemplo avanzado: Calcular total, promedio, máximo y mínimo
        const estadisticas = ventas.reduce((acc, val) => {
            return {
                total: acc.total + val,
                max: Math.max(acc.max, val),
                min: Math.min(acc.min, val),
                count: acc.count + 1
            };
        }, { total: 0, max: -Infinity, min: Infinity, count: 0 });
        
        console.log("Estadísticas completas:", {
            total: estadisticas.total,
            promedio: estadisticas.total / estadisticas.count,
            max: estadisticas.max,
            min: estadisticas.min
        });`,
            explicacion: "💡 reduce() acumula valores en un solo resultado. Recibe una función y un valor inicial. El primer parámetro es el acumulador, el segundo es el elemento actual. Útil para sumas, promedios, agrupaciones, etc."
        }, {
            id: 9,
            titulo: "Optional Chaining y Nullish Coalescing",
            dificultad: "Difícil",
            concepto: "Optional Chaining, Nullish Coalescing",
            descripcion: "Acceder a propiedades anidadas de forma segura con ?. y usar ?? para valores por defecto.",
            codigo: `//  Solución
        const usuario = {
            nombre: "Carlos",
            direccion: {
                calle: "Calle Falsa 123"
                // ciudad no está definida
            },
            contacto: {
                email: "carlos@email.com"
                // telefono no está definido
            }
        };
        
        // ACCESO SEGURO CON OPTIONAL CHAINING (?.)
        
        // Accedemos a ciudad que no existe
        const ciudad = usuario?.direccion?.ciudad;
        console.log("Ciudad:", ciudad); // undefined (no hay error)
        
        // Accedemos a teléfono que no existe
        const telefono = usuario?.contacto?.telefono;
        console.log("Teléfono:", telefono); // undefined (no hay error)
        
        // VALORES POR DEFECTO CON NULLISH COALESCING (??)
        
        // Usamos ?? para proporcionar valores por defecto
        const ciudadConDefecto = usuario?.direccion?.ciudad ?? "Ciudad no especificada";
        const telefonoConDefecto = usuario?.contacto?.telefono ?? "Teléfono no disponible";
        
        console.log("Ciudad (con default):", ciudadConDefecto);
        console.log("Teléfono (con default):", telefonoConDefecto);
        
        // DIFERENCIA ENTRE ?? y || (importante)
        const configuracion = {
            puerto: 0,
            nombre: "",
            debug: false
        };
        
        // Con || (OR) - considera 0, "", false como falsos
        const puertoOR = configuracion.puerto || 3000; // 3000 (pierde el 0)
        const nombreOR = configuracion.nombre || "default"; // "default" (pierde el "")
        console.log("Con ||:", puertoOR, nombreOR);
        
        // Con ?? (Nullish) - solo considera null/undefined
        const puertoNullish = configuracion.puerto ?? 3000; // 0 (preserva el 0)
        const nombreNullish = configuracion.nombre ?? "default"; // "" (preserva el "")
        console.log("Con ??:", puertoNullish, nombreNullish);`,
            explicacion: "💡 ?. (Optional Chaining) evita errores al acceder a propiedades anidadas. ?? (Nullish Coalescing) solo actúa con null o undefined. Diferencia clave: ?? es más estricto que || (preserva 0, '', false)."
        }, {
            id: 10,
            titulo: "Proyecto Integrador",
            dificultad: "Difícil",
            concepto: "Integración de conceptos",
            descripcion: "Aplicar múltiples conceptos en un caso práctico: filter, map, reduce, async/await.",
            codigo: `//  Solución
        const productos = [
            { nombre: "Laptop", precio: 800 },
            { nombre: "Mouse", precio: 25 },
            { nombre: "Teclado", precio: 120 },
            { nombre: "Monitor", precio: 350 },
            { nombre: "USB", precio: 15 }
        ];
        
        // Función para simular operación asíncrona
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        
        async function procesarProductos() {
            try {
                console.log("Iniciando procesamiento de productos...");
                await delay(1000);
                
                // 1. FILTRAR: productos con precio > 100
                const productosCaros = productos.filter(p => p.precio > 100);
                console.log("Productos caros (> $100):", productosCaros);
                
                // 2. REDUCE: Calcular precio total
                const totalCaros = productosCaros.reduce((total, p) => total + p.precio, 0);
                console.log(\`Total productos caros: $\${totalCaros}\`);
                
                // 3. MAP: Aplicar 10% de descuento
                const productosConDescuento = productosCaros.map(p => ({
                    ...p,
                    precioConDescuento: p.precio * 0.9,
                    ahorro: p.precio * 0.1
                }));
                console.log("Productos con descuento:", productosConDescuento);
                
                // 4. Calcular estadísticas finales
                const totalConDescuento = productosConDescuento.reduce(
                    (total, p) => total + p.precioConDescuento, 0
                );
                
                console.log(\` Total original: $\${totalCaros}\`);
                console.log(\`Total con descuento: $\${totalConDescuento}\`);
                console.log(\`Ahorro total: $\${totalCaros - totalConDescuento}\`);
                
                return {
                    productosCaros,
                    totalOriginal: totalCaros,
                    productosConDescuento,
                    totalConDescuento
                };
            } catch (error) {
                console.error(" Error:", error);
                throw error;
            }
        }
        
        procesarProductos()
            .then(resultado => console.log(" Proceso completado", resultado))
            .catch(error => console.error(" Error fatal:", error));`,
            explicacion: "💡 Proyecto integrador que combina: filter (seleccionar elementos), map (transformar), reduce (acumular valores), async/await (operaciones asíncronas), try/catch (manejo de errores) y spread operator (clonar objetos)."
        }];

        // --- CONCEPTOS ---
        const conceptos = [{
            titulo: "const / let",
            desc: "Declaración de variables. const para inmutables, let para mutables.",
            sintaxis: "const nombre = 'Ana'; let edad = 22;"
        }, {
            titulo: "Template Literals",
            desc: "Strings con interpolación usando backticks (`) y ${}.",
            sintaxis: "`Hola ${nombre}`"
        }, {
            titulo: "Destructuring",
            desc: "Extraer propiedades de objetos o elementos de arrays.",
            sintaxis: "const { nombre, precio } = producto;"
        }, {
            titulo: "Spread Operator",
            desc: "Expandir elementos de arrays o propiedades de objetos.",
            sintaxis: "[...arr1, ...arr2]  o  { ...obj }"
        }, {
            titulo: "Promesas",
            desc: "Manejo de operaciones asíncronas con then, catch, finally.",
            sintaxis: "new Promise((resolve, reject) => {})"
        }, {
            titulo: "Async/Await",
            desc: "Sintaxis moderna para manejar promesas de forma secuencial.",
            sintaxis: "async function() { await ... }"
        }, {
            titulo: "filter()",
            desc: "Filtra elementos de un array según una condición.",
            sintaxis: "arr.filter(item => item > 5)"
        }, {
            titulo: "map()",
            desc: "Transforma cada elemento de un array.",
            sintaxis: "arr.map(item => item * 2)"
        }, {
            titulo: "reduce()",
            desc: "Acumula valores en un solo resultado.",
            sintaxis: "arr.reduce((acc, val) => acc + val, 0)"
        }, {
            titulo: "Optional Chaining",
            desc: "Acceso seguro a propiedades anidadas.",
            sintaxis: "obj?.prop?.subprop"
        }, {
            titulo: "Nullish Coalescing",
            desc: "Valor por defecto solo si es null o undefined.",
            sintaxis: "valor ?? 'default'"
        }];

        // --- ESTADO ---
        let ejercicioActual = 0;
        const ejerciciosCompletados = new Set();

        // --- FUNCIONES ---

        function renderNav() {
            const nav = document.getElementById('navExercises');
            nav.innerHTML = ejercicios.map((ej, index) => `
                <button class="nav-btn ${index === ejercicioActual ? 'active' : ''} ${ejerciciosCompletados.has(index) ? 'completed' : ''}"
                        data-index="${index}"
                        onclick="cambiarEjercicio(${index})">
                    ${index + 1}. ${ej.titulo}
                </button>
            `).join('');
        }

        function renderExercise(index) {
            const ej = ejercicios[index];
            const panel = document.getElementById('exercisePanel');

            panel.innerHTML = `
                <div class="panel-header">
                    <h2>
                        <span class="exercise-number">Ejercicio ${ej.id}</span>
                        ${ej.titulo}
                    </h2>
                    <span style="font-size:0.85rem; color: var(--gray-400);">${ej.dificultad}</span>
                </div>
                <div class="panel-body">
                    <div class="description">
                        <strong>📝 Enunciado:</strong> ${ej.descripcion}
                        <br>
                        <strong> Concepto:</strong> ${ej.concepto}
                    </div>

                    <div class="code-block">
                        <button class="copy-btn" onclick="copiarCodigo(${index})">📋 Copiar</button>
                        <pre>${ej.codigo}</pre>
                    </div>

                    <div class="explanation">
                        <strong>💡 Explicación:</strong>
                        ${ej.explicacion}
                    </div>

                    <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="btn btn-success" onclick="marcarCompletado(${index})">
                             Marcar como completado
                        </button>
                        <button class="btn btn-outline" onclick="cambiarEjercicio(${index - 1})" ${index === 0 ? 'disabled style="opacity:0.5;"' : ''}>
                            ⬅ Anterior
                        </button>
                        <button class="btn btn-primary" onclick="cambiarEjercicio(${index + 1})" ${index === ejercicios.length - 1 ? 'disabled style="opacity:0.5;"' : ''}>
                            Siguiente ➡
                        </button>
                    </div>
                </div>
            `;

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.index) === index) {
                    btn.classList.add('active');
                }
            });

            actualizarProgreso();
        }

        function cambiarEjercicio(index) {
            if (index < 0 || index >= ejercicios.length) return;
            ejercicioActual = index;
            renderNav();
            renderExercise(index);
            // Scroll al panel
            document.getElementById('exercisePanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function marcarCompletado(index) {
            if (ejerciciosCompletados.has(index)) {
                ejerciciosCompletados.delete(index);
                mostrarToast('Ejercicio desmarcado', 'info');
            } else {
                ejerciciosCompletados.add(index);
                mostrarToast(' Ejercicio completado', 'success');
            }
            renderNav();
            actualizarProgreso();
        }

        function actualizarProgreso() {
            const total = ejercicios.length;
            const completados = ejerciciosCompletados.size;
            const porcentaje = (completados / total) * 100;

            document.getElementById('progressFill').style.width = `${porcentaje}%`;
            document.getElementById('progressText').textContent = `${completados}/${total} ejercicios completados`;
        }

        function copiarCodigo(index) {
            const ej = ejercicios[index];
            navigator.clipboard.writeText(ej.codigo).then(() => {
                mostrarToast('📋 Código copiado al portapapeles', 'success');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = ej.codigo;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                mostrarToast('📋 Código copiado al portapapeles', 'success');
            });
        }

        function renderConceptos() {
            const container = document.getElementById('conceptsList');
            container.innerHTML = conceptos.map(c => `
                <div class="concept-item">
                    <div class="concept-title">${c.titulo}</div>
                    <div class="concept-desc">${c.desc}</div>
                    <div class="concept-syntax">${c.sintaxis}</div>
                </div>
            `).join('');
        }

        function mostrarToast(mensaje, tipo = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.className = `toast ${tipo}`;
            toast.classList.add('show');

            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- INICIALIZACIÓN ---
        renderConceptos();
        renderNav();
        renderExercise(0);

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && ejercicioActual < ejercicios.length - 1) {
                cambiarEjercicio(ejercicioActual + 1);
            } else if (e.key === 'ArrowLeft' && ejercicioActual > 0) {
                cambiarEjercicio(ejercicioActual - 1);
            }
        });

        console.log('💡 Tips:');
        console.log('  - Usa las flechas ← → para navegar entre ejercicios');
        console.log('  - Cada ejercicio tiene solución y explicación');
        console.log('  - Marca los ejercicios completados para seguir tu progreso');
        console.log('  - El código se puede copiar con el botón 📋');
    </script>
</body>

</html>
