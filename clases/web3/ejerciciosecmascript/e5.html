<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Arial;
            background: #f8fafc;
            padding: 20px;
        }

        #conversorBox {
            background: white;
            padding: 35px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }

        .input-group input,
        .input-group select {
            padding: 12px;
            width: 80%;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
        }

        #resultadoConversion {
            font-size: 32px;
            font-weight: bold;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 15px;
            margin: 20px 0;
        }

        button {
            padding: 14px 40px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        .btn-convertir {
            background: #8b5cf6;
        }

        .btn-convertir:hover {
            background: #7c3aed;
        }
    </style>
</head>

<body>
    <div id="conversorBox">
        <h2>📐 Conversor de Unidades</h2>

        <div class="input-group">
            <label>📏 Valor</label>
            <input type="number" id="valorConversion" value="1" step="any">
        </div>

        <div class="input-group">
            <label>🔄 De:</label>
            <select id="unidadOrigen">
                <option value="km">Kilómetros (km)</option>
                <option value="m" selected>Metros (m)</option>
                <option value="cm">Centímetros (cm)</option>
                <option value="mm">Milímetros (mm)</option>
                <option value="mi">Millas (mi)</option>
                <option value="ft">Pies (ft)</option>
            </select>
        </div>

        <div class="input-group">
            <label>➡️ A:</label>
            <select id="unidadDestino">
                <option value="km">Kilómetros (km)</option>
                <option value="m">Metros (m)</option>
                <option value="cm" selected>Centímetros (cm)</option>
                <option value="mm">Milímetros (mm)</option>
                <option value="mi">Millas (mi)</option>
                <option value="ft">Pies (ft)</option>
            </select>
        </div>

        <button class="btn-convertir" id="btnConvertir">🔄 Convertir</button>

        <div id="resultadoConversion">1 m = 100 cm</div>
    </div>

    <script>
        // Factores de conversión a metros
        const conversiones = {
            km: 1000,
            m: 1,
            cm: 0.01,
            mm: 0.001,
            mi: 1609.34,
            ft: 0.3048
        };

        const nombres = {
            km: 'Kilómetros',
            m: 'Metros',
            cm: 'Centímetros',
            mm: 'Milímetros',
            mi: 'Millas',
            ft: 'Pies'
        };

        function convertir() {
            const valor = parseFloat(document.getElementById('valorConversion').value);
            const origen = document.getElementById('unidadOrigen').value;
            const destino = document.getElementById('unidadDestino').value;

            if (isNaN(valor) || valor <= 0) {
                document.getElementById('resultadoConversion').textContent = '❌ Valor inválido';
                return;
            }

            // Convertir a metros
            const enMetros = valor * conversiones[origen];
            // Convertir a unidad destino
            const resultado = enMetros / conversiones[destino];

            const resultadoFinal = resultado < 0.01 ? resultado.toExponential(4) : resultado.toFixed(4);

            document.getElementById('resultadoConversion').textContent =
                `${valor} ${nombres[origen]} = ${resultadoFinal} ${nombres[destino]}`;

            console.log('📐 CONVERSIÓN REALIZADA:');
            console.log(`${valor} ${origen} → ${resultadoFinal} ${destino}`);
            console.log(`Factor usado: 1 ${origen} = ${(conversiones[origen] / conversiones[destino]).toFixed(6)} ${destino}`);
        }

        document.getElementById('btnConvertir').addEventListener('click', convertir);

        // Conversión automática al cambiar valores
        document.getElementById('valorConversion').addEventListener('input', convertir);
        document.getElementById('unidadOrigen').addEventListener('change', convertir);
        document.getElementById('unidadDestino').addEventListener('change', convertir);

        convertir();
    </script>
</body>

</html>
