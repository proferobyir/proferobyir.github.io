<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #0d0d2b;
            color: #a78bfa;
        }

        #alquimia {
            background: #1a1a4a;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            border: 3px solid #7c3aed;
        }

        #pocion {
            font-size: 100px;
            padding: 20px;
            background: #0d0d2b;
            border-radius: 15px;
            margin: 15px 0;
        }

        select,
        button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #7c3aed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #6d28d9;
        }

        #logPocion {
            background: #0d0d2b;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #c4b5fd;
        }
    </style>
</head>

<body>
    <div id="alquimia">
        <h2>🧪 ALQUIMIA DE POCIONES</h2>

        <div id="pocion">🧪</div>
        <div id="logPocion">🌿 Mezcla ingredientes</div>

        <form id="formPocion">
            <select id="ingrediente1">
                <option value="🌿">🌿 Hierba</option>
                <option value="🍄">🍄 Hongo</option>
                <option value="🪸">🪸 Coral</option>
                <option value="💎">💎 Gema</option>
            </select>

            <select id="ingrediente2">
                <option value="🌿">🌿 Hierba</option>
                <option value="🍄">🍄 Hongo</option>
                <option value="🪸">🪸 Coral</option>
                <option value="💎">💎 Gema</option>
            </select>

            <select id="colorPocion">
                <option value="🔴">🔴 Rojo</option>
                <option value="🟣">🟣 Violeta</option>
                <option value="🟢">🟢 Verde</option>
                <option value="🔵">🔵 Azul</option>
            </select>

            <button type="submit">🧙 Preparar Poción</button>
        </form>
    </div>

    <script>
        const efectos = {
            '🌿🌿': '💚 Sanación',
            '🍄🍄': '💀 Veneno',
            '💎💎': '⭐ Fuerza',
            '🌿🍄': '💫 Invisibilidad',
            '🍄💎': '🔥 Fuego',
            '🌿💎': '💨 Velocidad'
        };

        document.getElementById('formPocion').addEventListener('submit', (e) => {
            e.preventDefault();
            const i1 = document.getElementById('ingrediente1').value;
            const i2 = document.getElementById('ingrediente2').value;
            const color = document.getElementById('colorPocion').value;

            const clave = i1 + i2;
            const efecto = efectos[clave] || '❓ Desconocido';

            const pocionFinal = color + ' ' + i1 + i2;
            document.getElementById('pocion').textContent = pocionFinal;

            console.log('🧪 POCIÓN CREADA:');
            console.log(`Ingredientes: ${i1} + ${i2}`);
            console.log(`Color: ${color}`);
            console.log(`Efecto: ${efecto}`);
            console.log(`Poción: ${pocionFinal}`);

            const mensajes = {
                'Sanación': '💚 ¡Poción curativa preparada!',
                'Veneno': '💀 ¡Poción venenosa! ¡Cuidado!',
                'Fuerza': '⭐ ¡Poción de fuerza!',
                'Invisibilidad': '👻 ¡Te has vuelto invisible!',
                'Fuego': '🔥 ¡Poción de fuego!',
                'Velocidad': '💨 ¡Poción de velocidad!'
            };

            document.getElementById('logPocion').innerHTML = mensajes[efecto] || '🧪 Poción creada';
        });
    </script>
</body>

</html>
