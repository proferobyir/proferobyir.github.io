<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f1f5f9;
            padding: 20px;
        }

        #encuestaBox {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 450px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .campo {
            margin: 15px 0;
        }

        .campo label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }

        .campo input,
        .campo select,
        .campo textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .campo textarea {
            resize: vertical;
            min-height: 80px;
        }

        .estrellas {
            display: flex;
            gap: 10px;
            justify-content: center;
            font-size: 30px;
        }

        .estrellas span {
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .estrellas span:hover {
            transform: scale(1.2);
        }

        .estrellas span.seleccionada {
            color: #f59e0b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #7c3aed;
        }
    </style>
</head>

<body>
    <div id="encuestaBox">
        <h2>📊 Encuesta de Satisfacción</h2>

        <form id="formEncuesta">
            <div class="campo">
                <label>👤 Tu nombre</label>
                <input type="text" id="nombreEncuesta" placeholder="Opcional">
            </div>

            <div class="campo">
                <label>⭐ Califica tu experiencia</label>
                <div class="estrellas" id="estrellas">
                    <span data-valor="1">☆</span>
                    <span data-valor="2">☆</span>
                    <span data-valor="3">☆</span>
                    <span data-valor="4">☆</span>
                    <span data-valor="5">☆</span>
                </div>
                <div id="textoEstrella" style="text-align:center;color:#64748b;margin-top:5px;">Selecciona una
                    calificación</div>
            </div>

            <div class="campo">
                <label>📝 Comentarios</label>
                <textarea id="comentariosEncuesta" placeholder="¿Qué podemos mejorar?"></textarea>
            </div>

            <button type="submit">📨 Enviar encuesta</button>
        </form>

        <div id="mensajeEncuesta" style="margin-top:15px;font-size:14px;color:#64748b;">
            Tu opinión es importante para nosotros
        </div>
    </div>

    <script>
        let calificacion = 0;
        const textoCalificacion = {
            1: '😞 Muy insatisfecho',
            2: '😟 Insatisfecho',
            3: '😐 Neutral',
            4: '😊 Satisfecho',
            5: '😍 Muy satisfecho'
        };

        // Sistema de estrellas
        document.querySelectorAll('#estrellas span').forEach(star => {
            star.addEventListener('click', () => {
                calificacion = parseInt(star.dataset.valor);

                document.querySelectorAll('#estrellas span').forEach(s => {
                    const valor = parseInt(s.dataset.valor);
                    s.textContent = valor <= calificacion ? '★' : '☆';
                    s.classList.toggle('seleccionada', valor <= calificacion);
                });

                document.getElementById('textoEstrella').textContent = textoCalificacion[calificacion] || '';
            });

            star.addEventListener('mouseenter', () => {
                const valor = parseInt(star.dataset.valor);
                document.querySelectorAll('#estrellas span').forEach(s => {
                    const v = parseInt(s.dataset.valor);
                    s.textContent = v <= valor ? '★' : '☆';
                });
            });

            star.addEventListener('mouseleave', () => {
                document.querySelectorAll('#estrellas span').forEach(s => {
                    const valor = parseInt(s.dataset.valor);
                    s.textContent = valor <= calificacion ? '★' : '☆';
                });
            });
        });

        document.getElementById('formEncuesta').addEventListener('submit', (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombreEncuesta').value.trim() || 'Anónimo';
            const comentarios = document.getElementById('comentariosEncuesta').value.trim() || 'Sin comentarios';

            if (calificacion === 0) {
                document.getElementById('mensajeEncuesta').textContent = '⚠️ Por favor, selecciona una calificación';
                document.getElementById('mensajeEncuesta').style.color = '#dc2626';
                return;
            }

            // Enviar encuesta
            document.getElementById('mensajeEncuesta').textContent = '✅ ¡Encuesta enviada! Gracias por tu opinión';
            document.getElementById('mensajeEncuesta').style.color = '#16a34a';

            console.log('📊 ENCUESTA RECIBIDA:');
            console.log(`Nombre: ${nombre}`);
            console.log(`Calificación: ${calificacion} estrellas - ${textoCalificacion[calificacion]}`);
            console.log(`Comentarios: ${comentarios}`);
            console.log(`Fecha: ${new Date().toLocaleString()}`);
            console.log('✅ Encuesta completada');

            // Reiniciar formulario
            setTimeout(() => {
                document.getElementById('formEncuesta').reset();
                calificacion = 0;
                document.querySelectorAll('#estrellas span').forEach(s => {
                    s.textContent = '☆';
                    s.classList.remove('seleccionada');
                });
                document.getElementById('textoEstrella').textContent = 'Selecciona una calificación';
                document.getElementById('mensajeEncuesta').textContent = '📋 Nueva encuesta disponible';
                document.getElementById('mensajeEncuesta').style.color = '#64748b';
            }, 3000);
        });
    </script>
</body>

</html>
