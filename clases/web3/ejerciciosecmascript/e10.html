<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
        }

        #torneo {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px auto;
            border: 3px solid #3b82f6;
        }

        #campoBatalla {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 60px;
            padding: 20px;
            background: #0f172a;
            border-radius: 15px;
            margin: 15px 0;
        }

        .criatura {
            text-align: center;
        }

        .criatura .nombre {
            font-size: 14px;
            color: #94a3b8;
        }

        select,
        input,
        button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #logTorneo {
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            min-height: 50px;
            color: #93c5fd;
        }

        .vs {
            font-size: 30px;
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div id="torneo">
        <h2>🏆 TORNEO DE CRIATURAS</h2>

        <div id="campoBatalla">
            <div class="criatura">
                <div id="criatura1">🐉</div>
                <div class="nombre" id="nombre1">Dragón</div>
            </div>
            <div class="vs">⚔️</div>
            <div class="criatura">
                <div id="criatura2">🦁</div>
                <div class="nombre" id="nombre2">León</div>
            </div>
        </div>

        <div id="logTorneo">⚔️ Elige tus campeones</div>

        <form id="formTorneo">
            <select id="criaturaJugador">
                <option value="🐉">🐉 Dragón</option>
                <option value="🧛">🧛 Vampiro</option>
                <option value="🐺">🐺 Hombre Lobo</option>
                <option value="🦅">🦅 Grifo</option>
            </select>

            <input type="text" id="nombreJugador" placeholder="Nombre de tu criatura">

            <select id="criaturaEnemigo">
                <option value="🦁">🦁 León</option>
                <option value="🐻">🐻 Oso</option>
                <option value="🐍">🐍 Serpiente</option>
                <option value="🦂">🦂 Escorpión</option>
            </select>

            <input type="text" id="nombreEnemigo" placeholder="Nombre del enemigo">

            <button type="submit">⚔️ Iniciar Batalla</button>
        </form>
    </div>

    <script>
        document.getElementById('formTorneo').addEventListener('submit', (e) => {
            e.preventDefault();

            const emoji1 = document.getElementById('criaturaJugador').value;
            const nombre1 = document.getElementById('nombreJugador').value || 'Campeón';
            const emoji2 = document.getElementById('criaturaEnemigo').value;
            const nombre2 = document.getElementById('nombreEnemigo').value || 'Enemigo';

            document.getElementById('criatura1').textContent = emoji1;
            document.getElementById('nombre1').textContent = nombre1;
            document.getElementById('criatura2').textContent = emoji2;
            document.getElementById('nombre2').textContent = nombre2;

            // Simular batalla
            const poder1 = Math.floor(Math.random() * 50) + 50;
            const poder2 = Math.floor(Math.random() * 50) + 50;
            const ataques = Math.floor(Math.random() * 5) + 3;

            console.log('⚔️ BATALLA INICIADA:');
            console.log(`${nombre1} ${emoji1} vs ${nombre2} ${emoji2}`);
            console.log(`Poder de ${nombre1}: ${poder1}`);
            console.log(`Poder de ${nombre2}: ${poder2}`);

            let ganador;
            if (poder1 > poder2) {
                ganador = nombre1;
                document.getElementById('logTorneo').innerHTML =
                    `🏆 ¡${nombre1} ${emoji1} ha ganado la batalla! 🏆`;
            } else if (poder2 > poder1) {
                ganador = nombre2;
                document.getElementById('logTorneo').innerHTML =
                    `🏆 ¡${nombre2} ${emoji2} ha ganado la batalla! 🏆`;
            } else {
                ganador = 'Empate';
                document.getElementById('logTorneo').innerHTML =
                    `🤝 ¡Empate épico! Ambos caen al mismo tiempo`;
            }

            console.log(`Ganador: ${ganador}`);
            console.log(`Ataques realizados: ${ataques}`);
            console.log('✅ Batalla finalizada');
        });
    </script>
</body>

</html>
