<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f1f5f9;
            padding: 20px;
        }

        #viajesBox {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 450px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .campo {
            margin: 15px 0;
        }

        .campo label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }

        .campo input,
        .campo select,
        .campo textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .campo textarea {
            resize: vertical;
            min-height: 60px;
        }

        .campo-row {
            display: flex;
            gap: 10px;
        }

        .campo-row .campo {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #resumenViaje {
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            color: #334155;
        }
    </style>
</head>

<body>
    <div id="viajesBox">
        <h2>✈️ Planificador de Viajes</h2>

        <div id="resumenViaje">📋 Completa los datos para planificar tu viaje</div>

        <form id="formViaje">
            <div class="campo">
                <label>🌍 Destino</label>
                <input type="text" id="destinoViaje" placeholder="Ej: París, Tokio, etc." required>
            </div>

            <div class="campo-row">
                <div class="campo">
                    <label>📅 Fecha salida</label>
                    <input type="date" id="fechaSalida" required>
                </div>
                <div class="campo">
                    <label>📅 Fecha regreso</label>
                    <input type="date" id="fechaRegreso" required>
                </div>
            </div>

            <div class="campo">
                <label>👥 Número de viajeros</label>
                <input type="number" id="viajeros" min="1" max="20" value="2">
            </div>

            <div class="campo">
                <label>💰 Presupuesto estimado</label>
                <input type="number" id="presupuestoViaje" step="0.01" placeholder="En tu moneda local">
            </div>

            <div class="campo">
                <label>📝 Actividades planeadas</label>
                <textarea id="actividades" placeholder="¿Qué quieres hacer?"></textarea>
            </div>

            <button type="submit">📋 Planificar Viaje</button>
        </form>
    </div>

    <script>
        document.getElementById('formViaje').addEventListener('submit', (e) => {
            e.preventDefault();

            const destino = document.getElementById('destinoViaje').value.trim();
            const fechaSalida = document.getElementById('fechaSalida').value;
            const fechaRegreso = document.getElementById('fechaRegreso').value;
            const viajeros = parseInt(document.getElementById('viajeros').value);
            const presupuesto = parseFloat(document.getElementById('presupuestoViaje').value) || 0;
            const actividades = document.getElementById('actividades').value.trim() || 'No especificadas';

            // Validaciones
            if (!destino || destino.length < 3) {
                document.getElementById('resumenViaje').textContent = '⚠️ Destino inválido (mínimo 3 caracteres)';
                document.getElementById('resumenViaje').style.color = '#dc2626';
                return;
            }

            if (!fechaSalida || !fechaRegreso) {
                document.getElementById('resumenViaje').textContent = '⚠️ Selecciona fechas válidas';
                document.getElementById('resumenViaje').style.color = '#dc2626';
                return;
            }

            const salida = new Date(fechaSalida);
            const regreso = new Date(fechaRegreso);
            if (regreso < salida) {
                document.getElementById('resumenViaje').textContent = '⚠️ La fecha de regreso debe ser posterior a la salida';
                document.getElementById('resumenViaje').style.color = '#dc2626';
                return;
            }

            // Calcular duración
            const diffTime = Math.abs(regreso - salida);
            const diffDias = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // Éxito
            document.getElementById('resumenViaje').innerHTML = `
      ✅ ¡Viaje planificado exitosamente!<br>
      <strong>${destino}</strong> · ${diffDias} días · ${viajeros} viajeros
    `;
            document.getElementById('resumenViaje').style.color = '#16a34a';

            console.log('✈️ PLAN DE VIAJE:');
            console.log(`Destino: ${destino}`);
            console.log(`Fecha salida: ${fechaSalida}`);
            console.log(`Fecha regreso: ${fechaRegreso}`);
            console.log(`Duración: ${diffDias} días`);
            console.log(`Viajeros: ${viajeros}`);
            console.log(`Presupuesto: $${presupuesto.toFixed(2)} (${viajeros > 1 ? `$${(presupuesto / viajeros).toFixed(2)} por persona` : 'individual'})`);
            console.log(`Actividades: ${actividades}`);
            console.log(`Fecha de planificación: ${new Date().toLocaleString()}`);
            console.log('✅ Viaje registrado');

            // Reset form después de 3 segundos
            setTimeout(() => {
                document.getElementById('formViaje').reset();
                document.getElementById('resumenViaje').innerHTML = '📋 Nuevo viaje listo para planificar';
                document.getElementById('resumenViaje').style.color = '#334155';
            }, 4000);
        });

        // Fecha mínima para hoy
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fechaSalida').min = today;
            document.getElementById('fechaRegreso').min = today;
        });
    </script>
</body>

</html>
