<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #2d3436;
            color: #dfe6e9;
        }

        #creador {
            background: #636e72;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
        }

        #personajePreview {
            font-size: 80px;
            padding: 20px;
            background: #2d3436;
            border-radius: 15px;
            margin: 15px 0;
        }

        select,
        input,
        button {
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #00b894;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00a381;
        }
    </style>
</head>

<body>
    <div id="creador">
        <h2>🎨 CREADOR DE PERSONAJES</h2>

        <div id="personajePreview">🧙</div>

        <form id="formPersonaje">
            <select id="tipoPersonaje">
                <option value="🧙">🧙 Mago</option>
                <option value="⚔️">⚔️ Guerrero</option>
                <option value="🏹">🏹 Arquero</option>
                <option value="🛡️">🛡️ Paladín</option>
                <option value="🧝">🧝 Elfo</option>
            </select>

            <input type="text" id="nombrePersonaje" placeholder="Nombre del personaje">

            <select id="elemento">
                <option value="🔥">🔥 Fuego</option>
                <option value="💧">💧 Agua</option>
                <option value="🌪️">🌪️ Viento</option>
                <option value="🌍">🌍 Tierra</option>
            </select>

            <button type="submit">⚡ Crear Personaje</button>
        </form>
    </div>

    <script>
        const preview = document.getElementById('personajePreview');
        const tipoSelect = document.getElementById('tipoPersonaje');
        const elementoSelect = document.getElementById('elemento');

        // Actualizar preview en tiempo real
        tipoSelect.addEventListener('change', () => {
            preview.textContent = tipoSelect.value;
        });

        document.getElementById('formPersonaje').addEventListener('submit', (e) => {
            e.preventDefault();
            const tipo = tipoSelect.value;
            const nombre = document.getElementById('nombrePersonaje').value || 'Anónimo';
            const elemento = elementoSelect.value;

            console.log('🎮 PERSONAJE CREADO:');
            console.log(`Nombre: ${nombre}`);
            console.log(`Clase: ${tipo}`);
            console.log(`Elemento: ${elemento}`);
            console.log(`Emoji: ${tipo} ${elemento}`);
            console.log('✅ Personaje registrado en la aventura');

            preview.textContent = tipo + ' ' + elemento;
            preview.style.transform = 'scale(1.2)';
            setTimeout(() => preview.style.transform = 'scale(1)', 300);
        });
    </script>
</body>

</html>
