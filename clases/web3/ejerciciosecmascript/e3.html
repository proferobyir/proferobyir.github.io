<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Arial;
            background: #f1f5f9;
            padding: 20px;
        }

        #tareasBox {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .tarea {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            margin: 8px 0;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s;
        }

        .tarea.completada {
            background: #dcfce7;
            border-left-color: #22c55e;
            opacity: 0.8;
        }

        .tarea.completada .texto-tarea {
            text-decoration: line-through;
            color: #64748b;
        }

        .texto-tarea {
            flex: 1;
            text-align: left;
            font-size: 16px;
        }

        .btn-accion {
            padding: 6px 14px;
            margin: 0 4px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-completar {
            background: #22c55e;
            color: white;
        }

        .btn-completar:hover {
            background: #16a34a;
        }

        .btn-eliminar {
            background: #ef4444;
            color: white;
        }

        .btn-eliminar:hover {
            background: #dc2626;
        }

        #contadorTareas {
            font-size: 18px;
            margin: 15px 0;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 10px;
        }

        .input-nueva {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .input-nueva input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }

        .input-nueva button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .input-nueva button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div id="tareasBox">
        <h2>✅ Gestor de Tareas</h2>

        <div id="contadorTareas">
            📋 Total: <span id="totalTareas">0</span> |
            ✅ Completadas: <span id="completadasTareas">0</span> |
            ⏳ Pendientes: <span id="pendientesTareas">0</span>
        </div>

        <div id="listaTareas"></div>

        <div class="input-nueva">
            <input type="text" id="nuevaTarea" placeholder="Nueva tarea...">
            <button id="btnAgregarTarea">➕ Agregar</button>
        </div>

        <button id="btnLimpiarTareas"
            style="background:#ef4444;color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;">
            🗑️ Limpiar completadas
        </button>
    </div>

    <script>
        let tareas = [
            { id: 1, texto: 'Completar informe mensual', completada: false },
            { id: 2, texto: 'Revisar correos pendientes', completada: false },
            { id: 3, texto: 'Preparar presentación', completada: true }
        ];
        let nextId = 4;

        function renderizarTareas() {
            const lista = document.getElementById('listaTareas');
            lista.innerHTML = '';

            if (tareas.length === 0) {
                lista.innerHTML = '<p style="color:#94a3b8;padding:20px;">🎯 No hay tareas pendientes</p>';
            }

            tareas.forEach(tarea => {
                const div = document.createElement('div');
                div.className = `tarea ${tarea.completada ? 'completada' : ''}`;

                div.innerHTML = `
        <span class="texto-tarea">${tarea.completada ? '✅' : '⬜'} ${tarea.texto}</span>
        <div>
          <button class="btn-accion btn-completar" data-id="${tarea.id}">
            ${tarea.completada ? '↩️' : '✅'}
          </button>
          <button class="btn-accion btn-eliminar" data-id="${tarea.id}">🗑️</button>
        </div>
      `;

                lista.appendChild(div);
            });

            // Actualizar contador
            const total = tareas.length;
            const completadas = tareas.filter(t => t.completada).length;
            const pendientes = total - completadas;

            document.getElementById('totalTareas').textContent = total;
            document.getElementById('completadasTareas').textContent = completadas;
            document.getElementById('pendientesTareas').textContent = pendientes;

            // Eventos para los botones de las tareas
            document.querySelectorAll('.btn-completar').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    toggleTarea(id);
                });
            });

            document.querySelectorAll('.btn-eliminar').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    eliminarTarea(id);
                });
            });
        }

        function toggleTarea(id) {
            tareas = tareas.map(t =>
                t.id === id ? { ...t, completada: !t.completada } : t
            );
            renderizarTareas();
        }

        function eliminarTarea(id) {
            tareas = tareas.filter(t => t.id !== id);
            renderizarTareas();
        }

        function agregarTarea() {
            const input = document.getElementById('nuevaTarea');
            const texto = input.value.trim();
            if (texto) {
                tareas.push({ id: nextId++, texto, completada: false });
                input.value = '';
                renderizarTareas();
            }
        }

        document.getElementById('btnAgregarTarea').addEventListener('click', agregarTarea);
        document.getElementById('nuevaTarea').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') agregarTarea();
        });
        document.getElementById('btnLimpiarTareas').addEventListener('click', () => {
            tareas = tareas.filter(t => !t.completada);
            renderizarTareas();
        });

        renderizarTareas();
    </script>
</body>

</html>
