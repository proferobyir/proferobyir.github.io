<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #1a0b0b;
            color: #fbbf24;
        }

        #bestiario {
            background: #2d1818;
            padding: 30px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            border: 3px solid #b45309;
        }

        #criaturaPreview {
            font-size: 100px;
            padding: 20px;
            background: #1a0b0b;
            border-radius: 15px;
            margin: 15px 0;
        }

        select,
        input,
        button {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            width: 100%;
            font-size: 16px;
        }

        button {
            background: #b45309;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #92400e;
        }

        #logBestiario {
            background: #1a0b0b;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #fde68a;
        }
    </style>
</head>

<body>
    <div id="bestiario">
        <h2>📜 BESTIARIO MÁGICO</h2>

        <div id="criaturaPreview">🐉</div>
        <div id="logBestiario">📖 Registra una criatura</div>

        <form id="formBestiario">
            <input type="text" id="nombreCriatura" placeholder="Nombre de la criatura">

            <select id="tipoCriatura">
                <option value="🐉">🐉 Dragón</option>
                <option value="🧛">🧛 Vampiro</option>
                <option value="🧜">🧜 Sirena</option>
                <option value="🐺">🐺 Hombre Lobo</option>
                <option value="🦅">🦅 Grifo</option>
            </select>

            <select id="elementoCriatura">
                <option value="🔥">🔥 Fuego</option>
                <option value="❄️">❄️ Hielo</option>
                <option value="⚡">⚡ Rayo</option>
                <option value="🌪️">🌪️ Viento</option>
            </select>

            <select id="rareza">
                <option value="⭐">⭐ Común</option>
                <option value="⭐⭐">⭐⭐ Rara</option>
                <option value="⭐⭐⭐">⭐⭐⭐ Épica</option>
                <option value="⭐⭐⭐⭐">⭐⭐⭐⭐ Legendaria</option>
            </select>

            <button type="submit">📝 Registrar Criatura</button>
        </form>
    </div>

    <script>
        document.getElementById('formBestiario').addEventListener('submit', (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombreCriatura').value || 'Criatura sin nombre';
            const tipo = document.getElementById('tipoCriatura').value;
            const elemento = document.getElementById('elementoCriatura').value;
            const rareza = document.getElementById('rareza').value;

            const preview = document.getElementById('criaturaPreview');
            preview.textContent = tipo + ' ' + elemento;

            console.log('📜 CRIATURA REGISTRADA:');
            console.log(`Nombre: ${nombre}`);
            console.log(`Tipo: ${tipo}`);
            console.log(`Elemento: ${elemento}`);
            console.log(`Rareza: ${rareza}`);
            console.log(`Emoji: ${tipo} ${elemento}`);

            const rarezaTexto = {
                '⭐': 'Común',
                '⭐⭐': 'Rara',
                '⭐⭐⭐': 'Épica',
                '⭐⭐⭐⭐': 'Legendaria'
            };

            document.getElementById('logBestiario').innerHTML =
                `📖 ¡${nombre} (${rarezaTexto[rareza]}) registrado! ${tipo}`;

            // Animación de registro
            preview.style.transform = 'scale(1.3)';
            setTimeout(() => preview.style.transform = 'scale(1)', 300);
        });
    </script>
</body>

</html>
