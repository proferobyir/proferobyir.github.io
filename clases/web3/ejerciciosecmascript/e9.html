<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f1f5f9;
            padding: 20px;
        }

        #habitosBox {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 450px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .habito-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #f8fafc;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s;
        }

        .habito-item.completado {
            background: #dcfce7;
            border-color: #22c55e;
        }

        .habito-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .habito-item .nombre-habito {
            flex: 1;
            font-size: 16px;
        }

        .habito-item .emoji-habito {
            font-size: 24px;
            margin-right: 10px;
        }

        .campo {
            margin: 15px 0;
        }

        .campo input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-agregar {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-agregar:hover {
            background: #2563eb;
        }

        #estadisticasHabitos {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="habitosBox">
        <h2>📋 Registro de Hábitos</h2>

        <div id="estadisticasHabitos">
            <span>✅ Completados: <strong id="completadosHabitos">0</strong></span>
            <span>⏳ Pendientes: <strong id="pendientesHabitos">0</strong></span>
            <span>📊 Progreso: <strong id="progresoHabitos">0%</strong></span>
        </div>

        <div id="listaHabitos">
            <div class="habito-item">
                <span class="emoji-habito">📚</span>
                <span class="nombre-habito">Leer 30 minutos</span>
                <input type="checkbox" data-id="1">
            </div>
            <div class="habito-item">
                <span class="emoji-habito">🏃</span>
                <span class="nombre-habito">Hacer ejercicio</span>
                <input type="checkbox" data-id="2">
            </div>
            <div class="habito-item">
                <span class="emoji-habito">💧</span>
                <span class="nombre-habito">Beber 2L agua</span>
                <input type="checkbox" data-id="3">
            </div>
        </div>

        <div class="campo">
            <input type="text" id="nuevoHabito" placeholder="Nuevo hábito (ej: Meditar 10 min)">
        </div>
        <button class="btn-agregar" id="btnAgregarHabito">➕ Agregar hábito</button>
    </div>

    <script>
        let habitos = [
            { id: 1, emoji: '📚', nombre: 'Leer 30 minutos', completado: false },
            { id: 2, emoji: '🏃', nombre: 'Hacer ejercicio', completado: false },
            { id: 3, emoji: '💧', nombre: 'Beber 2L agua', completado: false }
        ];
        let nextId = 4;

        function renderizarHabitos() {
            const lista = document.getElementById('listaHabitos');
            lista.innerHTML = '';

            habitos.forEach(habito => {
                const div = document.createElement('div');
                div.className = `habito-item ${habito.completado ? 'completado' : ''}`;

                div.innerHTML = `
        <span class="emoji-habito">${habito.emoji}</span>
        <span class="nombre-habito">${habito.nombre}</span>
        <input type="checkbox" ${habito.completado ? 'checked' : ''} data-id="${habito.id}">
      `;

                lista.appendChild(div);
            });

            // Eventos para los checkboxes
            document.querySelectorAll('#listaHabitos input[type="checkbox"]').forEach(cb => {
                cb.addEventListener('change', () => {
                    const id = parseInt(cb.dataset.id);
                    toggleHabito(id);
                });
            });

            actualizarEstadisticas();
        }

        function toggleHabito(id) {
            habitos = habitos.map(h =>
                h.id === id ? { ...h, completado: !h.completado } : h
            );
            renderizarHabitos();

            const habito = habitos.find(h => h.id === id);
            console.log(`📋 HÁBITO ACTUALIZADO: ${habito.nombre} → ${habito.completado ? '✅ Completado' : '⏳ Pendiente'}`);
        }

        function actualizarEstadisticas() {
            const total = habitos.length;
            const completados = habitos.filter(h => h.completado).length;
            const pendientes = total - completados;
            const progreso = total > 0 ? Math.round((completados / total) * 100) : 0;

            document.getElementById('completadosHabitos').textContent = completados;
            document.getElementById('pendientesHabitos').textContent = pendientes;
            document.getElementById('progresoHabitos').textContent = `${progreso}%`;
        }

        function agregarHabito() {
            const input = document.getElementById('nuevoHabito');
            const texto = input.value.trim();

            if (!texto) {
                alert('⚠️ Ingresa un hábito válido');
                return;
            }

            const emojis = ['📚', '🏃', '💧', '🧘', '🎯', '✍️', '🧠', '💪', '🌟', '🎨'];
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];

            habitos.push({
                id: nextId++,
                emoji: emoji,
                nombre: texto,
                completado: false
            });

            input.value = '';
            renderizarHabitos();

            console.log(`➕ NUEVO HÁBITO: ${emoji} ${texto}`);
        }

        document.getElementById('btnAgregarHabito').addEventListener('click', agregarHabito);
        document.getElementById('nuevoHabito').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') agregarHabito();
        });

        renderizarHabitos();
    </script>
</body>

</html>
