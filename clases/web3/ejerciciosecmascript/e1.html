<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Arial;
            background: #f0f0f0;
            transition: background 0.5s;
            padding: 20px;
        }

        #climaBox {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        #climaIcon {
            font-size: 80px;
            transition: transform 0.3s;
        }

        #climaText {
            font-size: 28px;
            margin: 15px 0;
            font-weight: bold;
        }

        #climaDesc {
            font-size: 18px;
            color: #666;
        }

        .btn-clima {
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: 500;
        }

        .btn-clima:hover {
            transform: scale(1.05);
        }

        .btn-clima:active {
            transform: scale(0.95);
        }

        #tempDisplay {
            font-size: 48px;
            margin: 15px 0;
        }
    </style>
</head>

<body>
    <div id="climaBox">
        <h2>🌤️ Simulador de Clima</h2>

        <div id="climaIcon">☀️</div>
        <div id="climaText">Soleado</div>
        <div id="tempDisplay">25°C</div>
        <div id="climaDesc">Día perfecto para salir</div>

        <div>
            <button class="btn-clima" style="background:#fbbf24;color:#1a1a1a;" id="btnSoleado">☀️ Soleado</button>
            <button class="btn-clima" style="background:#93c5fd;color:#1a1a1a;" id="btnNublado">☁️ Nublado</button>
            <button class="btn-clima" style="background:#60a5fa;color:white;" id="btnLluvia">🌧️ Lluvia</button>
            <button class="btn-clima" style="background:#94a3b8;color:white;" id="btnNieve">❄️ Nieve</button>
            <button class="btn-clima" style="background:#f87171;color:white;" id="btnTormenta">⛈️ Tormenta</button>
        </div>
    </div>

    <script>
        const climas = {
            soleado: { icon: '☀️', text: 'Soleado', temp: '25°C', desc: 'Día perfecto para salir', bg: '#fef3c7' },
            nublado: { icon: '☁️', text: 'Nublado', temp: '18°C', desc: 'Cielo cubierto, sin sol', bg: '#e2e8f0' },
            lluvia: { icon: '🌧️', text: 'Lluvia', temp: '12°C', desc: 'Lleva paraguas', bg: '#bfdbfe' },
            nieve: { icon: '❄️', text: 'Nieve', temp: '-2°C', desc: 'Abrígate bien', bg: '#e0f2fe' },
            tormenta: { icon: '⛈️', text: 'Tormenta', temp: '15°C', desc: '⚠️ Precaución afuera', bg: '#cbd5e1' }
        };

        function cambiarClima(tipo) {
            const clima = climas[tipo];
            document.getElementById('climaIcon').textContent = clima.icon;
            document.getElementById('climaText').textContent = clima.text;
            document.getElementById('tempDisplay').textContent = clima.temp;
            document.getElementById('climaDesc').textContent = clima.desc;
            document.body.style.background = clima.bg;

            // Animación
            const icon = document.getElementById('climaIcon');
            icon.style.transform = 'scale(1.3)';
            setTimeout(() => icon.style.transform = 'scale(1)', 300);
        }

        document.getElementById('btnSoleado').addEventListener('click', () => cambiarClima('soleado'));
        document.getElementById('btnNublado').addEventListener('click', () => cambiarClima('nublado'));
        document.getElementById('btnLluvia').addEventListener('click', () => cambiarClima('lluvia'));
        document.getElementById('btnNieve').addEventListener('click', () => cambiarClima('nieve'));
        document.getElementById('btnTormenta').addEventListener('click', () => cambiarClima('tormenta'));
    </script>
</body>

</html>
