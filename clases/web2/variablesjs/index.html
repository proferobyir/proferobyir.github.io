<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos Básicos de JavaScript</title>

</head>

<body>

    <h1>Fundamentos de JavaScript</h1>
    <p>Abre la consola del navegador (Presiona F12 o clic derecho -> Inspeccionar -> Consola) para ver la ejecución del
        código.</p>

    <script>
        // Imprimimos un mensaje de bienvenida para confirmar que el script funciona
        console.log("=== INICIO DEL SCRIPT: FUNDAMENTOS BÁSICOS ===");

        // ----------------------------------------------------
        // SECCIÓN 1: DECLARACIÓN Y TIPOS DE VARIABLES
        // ----------------------------------------------------
        let nombre = "Carlos";    // String (Texto) - Se puede reasignar
        const edad = 28;         // Number (Número) - No se puede cambiar (candado)
        let esMayor = true;      // Boolean (Verdadero/Falso)

        console.log("--- Sección: Variables ---");
        console.log("Nombre:", nombre, "| Tipo:", typeof nombre);
        console.log("Edad:", edad, "| Tipo:", typeof edad);
        console.log("¿Es mayor de edad?:", esMayor, "| Tipo:", typeof esMayor);

        // Ejemplo de reasignación con let
        nombre = "Juan";
        console.log("Nuevo nombre reasignado:", nombre);

        // Nota mental: Si intentaras hacer `edad = 30;` la consola lanzaría un TypeError.

        // ----------------------------------------------------
        // SECCIÓN 2: ÁMBITO O ALCANCE (SCOPE)
        // ----------------------------------------------------
        console.log("\n--- Sección: Scope ---");
        let variableGlobal = "Estoy afuera";

        if (true) {
            let variableLocal = "Estoy adentro";
            console.log("Desde adentro del IF puedo ver ambas:");
            console.log("-", variableGlobal);
            console.log("-", variableLocal);
        }

        console.log("Desde afuera del IF solo puedo ver la global:", variableGlobal);
        // console.log(variableLocal); // ❌ Si quitas el comentario, dará error porque 'variableLocal' murió al cerrar la llave }

        // ----------------------------------------------------
        // SECCIÓN 3: OPERADORES LÓGICOS
        // ----------------------------------------------------
        console.log("\n--- Sección: Operadores Lógicos ---");
        let edadPersona = 19;
        let tieneEntrada = false;

        // El operador && requiere que AMBAS condiciones sean verdaderas
        let puedeEntrar = (edadPersona >= 18) && tieneEntrada;
        console.log("¿La persona cumple ambas condiciones para entrar?:", puedeEntrar);

        // ----------------------------------------------------
        // SECCIÓN 4: SENTENCIAS CONDICIONALES (IF / ELSE)
        // ----------------------------------------------------
        console.log("\n--- Sección: Condicionales ---");
        let semaforo = "Rojo";

        if (semaforo === "Rojo") {
            console.log("Resultados del semáforo: 🛑 ¡Frena inmediatamente!");
        } else if (semaforo === "Verde") {
            console.log("Resultados del semáforo: 🍏 ¡Puedes pasar!");
        } else {
            console.log("Resultados del semáforo: ❓ Color desconocido.");
        }

        // ----------------------------------------------------
        // SECCIÓN 5: CICLOS (LOOPS)
        // ----------------------------------------------------
        console.log("\n--- Sección: Ciclos (Loops) ---");
        console.log("Iniciando bucle FOR...");

        for (let i = 1; i <= 3; i++) {
            console.log("  Contador 'i' va por la vuelta número:", i);
        }

        // ----------------------------------------------------
        // SECCIÓN 6: FUNCIONES TRADICIONALES Y FLECHA
        // ----------------------------------------------------
        console.log("\n--- Sección: Funciones ---");

        // 1. Función Tradicional (Usa la palabra 'function')
        function calcularDobleNormal(numero) {
            return numero * 2;
        }

        // 2. Función Flecha (Moderna, usa '=>' y se guarda en una constante)
        const calcularDobleFlecha = (numero) => {
            return numero * 2;
        };

        // Probamos ambas funciones imprimiendo en consola
        let resultadoNormal = calcularDobleNormal(5);
        let resultadoFlecha = calcularDobleFlecha(10);

        console.log("Resultado Función Tradicional (Doble de 5):", resultadoNormal);
        console.log("Resultado Función Flecha (Doble de 10):", resultadoFlecha);

        // Lanzamos un Alert final interactivo usando los datos procesados por nuestras funciones
        alert("¡Código ejecutado con éxito!\n\nEl doble de 5 usando función normal es: " + resultadoNormal + "\nEl doble de 10 usando función flecha es: " + resultadoFlecha);

        console.log("\n=== FIN DEL SCRIPT ===");
    </script>
</body>

</html>
