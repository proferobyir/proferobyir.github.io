<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - Contacto Rápido</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <div class="bg-green-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Contáctanos</h1>
            <p class="text-gray-500 text-sm">Completa el formulario y te responderemos...</p>
        </div>

        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Nombre completo</label>
                <input type="text" id="nombre" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Correo electrónico</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Teléfono</label>
                <input type="tel" id="telefono" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500">
            </div>

            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Mensaje</label>
                <textarea id="mensaje" rows="4" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500"></textarea>
            </div>

            <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300 transform hover:scale-105">
                Enviar mensaje 📤
            </button>
        </form>

        <div id="mensajeRespuesta" class="mt-4 text-center hidden"></div>
    </div>

    <script>
        // ⚠️ URL de prueba para n8n
        const N8N_WEBHOOK_URL = "https://cocvag-ip-38-224-153-29.tunnelmole.net/webhook/formulario-telegram";

        const form = document.getElementById('contactForm');
        const respuestaDiv = document.getElementById('mensajeRespuesta');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Mostrar loading en el botón
            const btn = form.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Enviando... ⏳';
            btn.disabled = true;

            // Recoger datos básicos
            const datosRaw = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                mensaje: document.getElementById('mensaje').value,
                fecha: new Date().toLocaleString('es-ES'),
                userAgent: navigator.userAgent
            };

            // Formatear los datos como formulario clásico (evita peticiones OPTIONS)
            const datosFormateados = new URLSearchParams();
            for (const [key, value] of Object.entries(datosRaw)) {
                datosFormateados.append(key, value);
            }

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: datosFormateados
                });

                if (response.ok) {
                    // Convertimos la respuesta de n8n a JSON
                    const data = await response.json();

                    // Si el JSON trae el mensaje que configuramos
                    respuestaDiv.className = 'mt-4 p-3 bg-green-100 text-green-700 rounded-lg text-center font-medium';
                    respuestaDiv.textContent = `✅ ¡Telegram: ${data.message || 'registro enviado'}!`;
                    respuestaDiv.classList.remove('hidden');
                    form.reset();
                } else {
                    throw new Error('El webhook respondió con un error');
                }
            } catch (error) {
                // Alerta en caso de caída del servidor o fallo de red
                respuestaDiv.className = 'mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-center font-medium';
                respuestaDiv.textContent = '❌ Error: No se pudo enviar a Telegram. Intenta nuevamente.';
                respuestaDiv.classList.remove('hidden');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;

                // Ocultar la alerta después de 6 segundos
                setTimeout(() => {
                    respuestaDiv.classList.add('hidden');
                }, 6000);
            }
        });
    </script>
</body>

</html>
