<head>

    <title>Editor en vivo de HTML, CSS y JavaScript</title>

    <link rel="icon"

    <style>
        /* ----- Paleta de colores Visual Studio Code (oscuro) ----- */
        :root {
            --vsc-bg: #1e1e1e;
            --vsc-sidebar: #252526;
            --vsc-activityBar: #333333;
            --vsc-editorBg: #1e1e1e;
            --vsc-editorLine: #2d2d30;
            --vsc-editorWidget: #2d2d30;
            --vsc-foreground: #d4d4d4;
            --vsc-comment: #6a9955;
            --vsc-string: #ce9178;
            --vsc-number: #b5cea8;
            --vsc-keyword: #569cd6;
            --vsc-function: #dcdcaa;
            --vsc-variable: #9cdcfe;
            --vsc-operator: #d4d4d4;
            --vsc-border: #3c3c3c;
            --vsc-panelBg: #1e1e1e;
            --vsc-inputBg: #3c3c3c;
            --vsc-inputFg: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vsc-bg);
            color: var(--vsc-foreground);
            font-family: 'Segoe UI', 'Consolas', 'Monaco', 'Menlo', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        /* Contenedor padre con grid 2 columnas (1fr cada una) */
        .editor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex: 1;
            min-height: 0;
            /* evita desborde */
            background-color: var(--vsc-bg);
            border: 1px solid var(--vsc-border);
            border-radius: 6px;
            overflow: hidden;
            padding: 4px;
        }

        /* Panel editor (izquierda) */
        .editor-panel {
            background-color: var(--vsc-editorBg);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--vsc-border);
            position: relative;
        }

        .editor-panel .toolbar {
            background-color: var(--vsc-activityBar);
            padding: 6px 12px;
            font-size: 13px;
            color: #bbbbbb;
            border-bottom: 1px solid var(--vsc-border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .editor-panel .toolbar span {
            background-color: var(--vsc-inputBg);
            padding: 0 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #aaa;
            letter-spacing: 0.3px;
        }

        .editor-panel textarea {
            flex: 1;
            width: 100%;
            background-color: var(--vsc-editorBg);
            color: var(--vsc-foreground);
            border: none;
            outline: none;
            resize: none;
            padding: 16px 14px;
            font-family: 'Consolas', 'Monaco', 'Menlo', 'Cascadia Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            tab-size: 2;
            white-space: pre-wrap;
            word-wrap: break-word;
            scrollbar-width: thin;
            scrollbar-color: var(--vsc-border) var(--vsc-editorBg);
        }

        .editor-panel textarea::-webkit-scrollbar {
            width: 8px;
        }

        .editor-panel textarea::-webkit-scrollbar-track {
            background: var(--vsc-editorBg);
        }

        .editor-panel textarea::-webkit-scrollbar-thumb {
            background-color: var(--vsc-border);
            border-radius: 4px;
        }

        /* Panel salida (derecha) */
        .output-panel {
            background-color: #ffffff;
            /* fondo blanco para simular navegador */
            border-radius: 4px;
            border: 1px solid var(--vsc-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #fcfcfc;
        }

        .output-panel .toolbar {
            background-color: var(--vsc-activityBar);
            padding: 6px 12px;
            font-size: 13px;
            color: #bbbbbb;
            border-bottom: 1px solid var(--vsc-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .output-panel .toolbar .badge {
            background-color: var(--vsc-inputBg);
            padding: 0 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #aaa;
        }

        .output-panel iframe {
            flex: 1;
            width: 100%;
            border: none;
            background-color: white;
            border-radius: 0 0 4px 4px;
        }

        /* Ajustes para móviles: grid en columna */
        @media (max-width: 720px) {
            .editor-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                gap: 8px;
            }

            body {
                padding: 4px;
            }
        }

        /* Estilo extra para el código de ejemplo (dentro del textarea) */
        .editor-panel textarea::selection {
            background: #264f78;
            color: #ffffff;
        }

        /* Footer minimal */
        .footer-note {
            color: #555;
            font-size: 11px;
            text-align: center;
            padding: 6px 0 2px;
            letter-spacing: 0.3px;
            border-top: 1px solid var(--vsc-border);
            margin-top: 8px;
        }

        .footer-note a {
            color: var(--vsc-keyword);
            text-decoration: none;
        }
    </style>
</head>

<body>

        <!-- COLUMNA DERECHA: SALIDA HTML -->
        <div class="output-panel">
            <div class="toolbar">
                <span>▶ salida</span>
                <span class="badge">actualización automática</span>
            </div>
            <iframe id="outputFrame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
        </div>
    </div>

    <div class="footer-note">
        ⚡ editor en vivo · cambios automáticos
    </div>

    <script>
        (function () {
            const editor = document.getElementById('codeEditor');
            const iframe = document.getElementById('outputFrame');

            // Función para actualizar el iframe con el contenido del editor
            function updatePreview() {
                const code = editor.value;
                // Escribimos el contenido completo en el iframe
                const doc = iframe.contentDocument || iframe.contentWindow?.document;
                if (doc) {
                    doc.open();
                    doc.write(code);
                    doc.close();
                }
            }

            // Escuchar cambios en el textarea (input, keyup, paste, etc.)
            editor.addEventListener('input', updatePreview);
            editor.addEventListener('change', updatePreview); // por si acaso

            // Inicializar la vista previa al cargar
            // (pequeño retraso para asegurar que el iframe esté listo)
            setTimeout(updatePreview, 100);

            // También actualizar si el iframe se recarga (por si acaso)
            iframe.addEventListener('load', function () {
                // En algunos navegadores, el contenido se pierde, lo reescribimos.
                // Pero con el 'sandbox' y 'allow-same-origin' podemos escribir desde el padre.
                updatePreview();
            });

            // Sincronizar con el foco: al perder el foco, actualizar (por si acaso)
            editor.addEventListener('blur', updatePreview);

            // Ajuste para móviles: si el textarea cambia de tamaño, no afecta.
            console.log('No hay excusas, ¡edita y prueba tu HTML en vivo! 👍');
        })();
    </script>
